name: Build & Test
on:
  push:
    branches:
      - foss

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (FOSS)
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Linter code
        run: ./gradlew spotlessApply

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Run unit tests
        id: unit_tests
        run: ./gradlew testReleaseUnitTest

      - name: Verify SQLDelight migrations
        run: ./gradlew verifySqlDelightMigration

      - name: Upload test report
        if: steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/testReleaseUnitTest

      - name: Build app
        run: ./gradlew assembleFoss
        
      - name: Sign APK
        uses: r0adkll/sign-android-release@a391126403df92c6a0a3988a829dd47f79b89ed7
        with:
          releaseDirectory: app/build/outputs/apk/foss
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.1'
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set MIHON_VERSION
        run: echo "MIHON_VERSION=v$(grep --only-matching --perl-regexp 'versionName\s=\s\"\K([0-9\.]+)' './app/build.gradle.kts')+$(git rev-parse --short 'HEAD')" >> "${GITHUB_ENV}"

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: "mihon-${{ env.MIHON_VERSION }}-foss"
          path: |
            app/build/outputs/apk/foss/app-universal-foss-unsigned-signed.apk
            app/build/outputs/apk/foss/app-arm64-v8a-foss-unsigned-signed.apk
            app/build/outputs/apk/foss/app-armeabi-v7a-foss-unsigned-signed.apk
            app/build/outputs/apk/foss/app-x86-foss-unsigned-signed.apk
            app/build/outputs/apk/foss/app-x86_64-foss-unsigned-signed.apk

      - name: Upload mapping
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: mapping-${{ github.sha }}
          path: app/build/outputs/mapping/foss
